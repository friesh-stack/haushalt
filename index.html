const lsDel = k => { try { localStorage.removeItem(k); } catch {} };

// ── Lokaler Parser (kein API nötig) ───────────────────────
function parseText(text) {
  const EINH = ["kg","g","l","ml","liter","stück","stk","packung","pack","flasche","dose","glas","beutel","becher","kasten","tüte","bund"];
  return text.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean).map(line => {
    const m = line.match(/^(\d+[.,]?\d*)\s*([a-zA-ZäöüÄÖÜ]{1,12})\s+(.+)$/);
    if (m && EINH.includes(m[2].toLowerCase())) return {name:m[3], qty:parseFloat(m[1].replace(",",".")), unit:m[2], sch:null};
    const n = line.match(/^(\d+)\s+(.+)$/);
    if (n) return {name:n[2], qty:parseInt(n[1]), unit:"Stück", sch:null};
    return {name:line, qty:1, unit:"Stück", sch:null};
  });
}

// ── Claude API ────────────────────────────────────────────
async function claudeCall(messages, system) {
  const key = lsGet("hm_key");
  if (!key) throw new Error("kein key");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:800, system, messages})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const t = d.content?.[0]?.text || "";
  return JSON.parse(t.replace(/```json|```/g,"").trim());
}

// ── Firebase ──────────────────────────────────────────────
const fbBase = () => lsGet("hm_fb");
const fbUrl = path => `${fbBase()}/haushalt/${path}.json`;

  try { const r = await fetch(fbUrl(path)); return r.ok ? await r.json() : null; } catch { return null; }
};
const fbSchreiben = async (path, data) => {
  try { await fetch(fbUrl(path), {method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); } catch {}
};

// ── Spracheingabe ─────────────────────────────────────────
const useSprache = cb => {
  const ref = useRef();
  const [an, setAn] = useState(false);
  const start = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Spracherkennung nicht verfügbar"); return; }
    const r = new SR(); r.lang="de-DE"; r.continuous=false; r.interimResults=false;
    r.onstart=()=>setAn(true); r.onend=()=>setAn(false); r.onerror=()=>setAn(false);
    r.onresult=e=>cb(e.results[0][0].transcript);
    ref.current=r; r.start();
  };
  const stop = () => { ref.current?.stop(); setAn(false); };
  return {an, start, stop};
};
const zuBase64 = f => new Promise((ok,err) => {
  const r = new FileReader();
  r.onload = () => ok({data:r.result.split(",")[1], mt:f.type});
  r.onerror = err; r.readAsDataURL(f);
});

    <div style={{background:"white", borderRadius:14, padding:14, marginBottom:12, boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>

        <input value={t} onChange={e=>setT(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&go()} placeholder={ph} disabled={busy}

    </div>
  );
};

// ── BESTAND TAB ───────────────────────────────────────────
const BestandTab = ({bestand, onAdd, onRemove}) => {
  const [bId, setBId] = useState("vr");

  const hinzufuegen = async (txt, gewSch) => {
    setBusy(true);
    try {
      let parsed;
      try {
        parsed = await claudeCall([{role:"user",content:txt}], `Extrahiere ALLE Lebensmittel. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück"}]`);
      } catch { parsed = parseText(txt); }
      if(parsed && parsed.length) {
        onAdd(oId, parsed.map(x=>({...x, fach: gewSch != null ? Number(gewSch) : null})));
        setZuletzt("✓ " + parsed.length + " Artikel" + (gewSch != null ? " → Schublade " + gewSch : ""));
        setTimeout(()=>setZuletzt(""), 3000);
      }
    } catch(e) { console.error(e); }
    setBusy(false);
  };


  return (
    <div>
      {/* Bereiche */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {BEREICHE.map(b => (
          <button key={b.id} onClick={()=>{setBId(b.id);setOId(b.orte[0].id);setFiltSch(null);}}

              borderColor:bId===b.id?"#3d5c3f":"#e5e7eb",
              background:bId===b.id?"#3d5c3f":"white",
              color:bId===b.id?"white":"#374151",fontSize:19,cursor:"pointer",fontWeight:700,lineHeight:1.3}}>
            {b.icon}<br/>{b.name}
          </button>
        ))}
      </div>

      {/* Orte */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {bereich?.orte.map(o => {
          const cnt = (bestand[o.id]||[]).length;
          return (
            <button key={o.id} onClick={()=>{setOId(o.id);setFiltSch(null);}}
              style={{padding:"5px 10px",borderRadius:20,border:"2px solid",
                borderColor:oId===o.id?"#3d5c3f":"#e5e7eb",
                background:oId===o.id?"#f0f4f1":"white",
                color:"#374151",fontSize:24,cursor:"pointer",fontWeight:oId===o.id?700:400,
                display:"flex",alignItems:"center",gap:4}}>
              {o.icon} {o.name}
              {cnt > 0 && <span style={{background:"#3d5c3f",color:"white",borderRadius:10,padding:"0 5px",fontSize:10}}>{cnt}</span>}
            </button>
          );
        })}
      </div>

      {/* Schubladen-Filter */}
      {hatSch && (
        <div style={{background:"white",borderRadius:12,padding:10,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:6}}>
            <span style={{fontSize:26,fontWeight:700,color:"#9ca3af"}}>ANZEIGEN:</span>

            {(ort.faecher||[]).map(s=>(

            ))}

            {(ort.faecher||[]).map(s=>(

            ))}

      <EingabeFeld ph={`Artikel für ${ort?.name||""}… (Komma trennt mehrere)`} onOK={txt => hinzufuegen(txt, neuSch)} busy={busy}/>

      {/* Artikelliste */}

      {/* Alle Lagerorte Übersicht */}

              <div style={{fontSize:21,color:"#9ca3af"}}>{o.bName} · {o.info}</div>

            </button>

  const [val, setVal] = useState({});
  const [gewOrt, setGewOrt] = useState(null);
  const [gewSch, setGewSch] = useState(null);

  const aehnlich = React.useMemo(() => {
    const name = item.name.toLowerCase().slice(0,5);
    const hits = [];
    ALLE_ORTE.forEach(o => {
      (bestand[o.id]||[]).forEach(i => {
        if(i.name.toLowerCase().includes(name)) hits.push({ort:o, fach:i.fach});

    return hits;
  }, [item.name, bestand]);

  const vorschlagOrt = aehnlich[0]?.ort.id || null;
  const vorschlagFach = aehnlich[0]?.fach || null;

  const oeffneEinlagern = () => {
    if(item.erledigt) return;
    setModus("einlagern");
    setGewOrt(vorschlagOrt || "ku1");
    setGewSch(vorschlagFach || null);
  };

  const aktOrtObj = ALLE_ORTE.find(o=>o.id===gewOrt);
  const aktBereich = BEREICHE.find(b=>b.id===aktOrtObj?.bId);

  if(modus==="einlagern") return (
    <div style={{background:"#f0f9f0",borderBottom:last?"none":"1px solid #e5e7eb",padding:"12px 14px"}}>
      <div style={{fontWeight:800,fontSize:19,marginBottom:6,color:"#2c3e2d"}}>
        📦 {item.name} einlagern
      </div>
      {aehnlich.length>0 && <div style={{background:"#d4f0d4",borderRadius:8,padding:"5px 10px",fontSize:15,color:"#2c5f2e",marginBottom:8,fontWeight:600}}>
        💡 Ähnlich: {[...new Set(aehnlich.map(a=>a.ort.name))].slice(0,2).join(", ")}
      </div>}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {BEREICHE.map(b=>(
          <button key={b.id} onClick={()=>{setGewOrt(b.orte[0].id);setGewSch(null);}}
            style={{padding:"6px 10px",borderRadius:8,border:"2px solid",fontSize:15,cursor:"pointer",fontWeight:700,
              borderColor:aktBereich?.id===b.id?"#3d5c3f":"#e5e7eb",
              background:aktBereich?.id===b.id?"#3d5c3f":"white",
              color:aktBereich?.id===b.id?"white":"#374151"}}>
            {b.icon} {b.name}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {aktBereich?.orte.map(o=>(
          <button key={o.id} onClick={()=>{setGewOrt(o.id);setGewSch(null);}}
            style={{padding:"4px 9px",borderRadius:20,border:"2px solid",fontSize:14,cursor:"pointer",
              borderColor:gewOrt===o.id?"#3d5c3f":"#e5e7eb",
              background:gewOrt===o.id?"#f0f4f1":"white",
              color:"#374151",fontWeight:gewOrt===o.id?700:400,
              display:"flex",alignItems:"center",gap:4}}>
            {o.nr&&<span style={{background:"#3d5c3f",color:"white",borderRadius:"50%",width:18,height:18,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{o.nr}</span>}
            {o.icon} {o.name.replace(/^(Küche|Vorratsraum|Keller) /,"")}
          </button>
        ))}
      </div>
      {(aktOrtObj?.faecher||[]).length>0 && (
        <div style={{marginBottom:8}}>
          <div style={{fontSize:13,color:"#9ca3af",marginBottom:4,fontWeight:700}}>SCHUBLADE:</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <SchBtn label="–" aktiv={gewSch===null} onClick={()=>setGewSch(null)} n={0}/>
            {(aktOrtObj.faecher||[]).map(s=>(
              <SchBtn key={s} label={`${s}`} aktiv={gewSch===s} onClick={()=>setGewSch(Number(s))} n={0}/>
            ))}
          </div>
          {gewSch&&<span style={{fontSize:14,color:"white",background:"#e53e3e",padding:"3px 10px",borderRadius:6,fontWeight:800,marginTop:4,display:"inline-block"}}>✓ Schublade {gewSch}</span>}
        </div>
      )}
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{onEinlagern(item,gewOrt,gewSch);setModus(null);}}
          style={{flex:2,padding:"11px",background:"#3d5c3f",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:17}}>
          ✅ Einlagern
        </button>
        <button onClick={()=>setModus("edit")} style={{flex:1,padding:"11px",background:"#f59e0b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:15}}>✏️</button>
        <button onClick={()=>setModus(null)} style={{padding:"11px 14px",background:"#e5e7eb",color:"#374151",border:"none",borderRadius:8,cursor:"pointer",fontSize:17}}>✕</button>
      </div>
    </div>
  );

  if(modus==="edit") return (
    <div style={{padding:"10px 12px",background:"#fff9e6",borderBottom:last?"none":"1px solid #e5e7eb"}}>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input value={val.name??item.name} onChange={e=>setVal(p=>({...p,name:e.target.value}))} autoFocus
          style={{flex:1,padding:"8px 10px",borderRadius:8,border:"2px solid #f59e0b",fontSize:18,outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input type="number" value={val.qty??item.qty}
          onChange={e=>setVal(p=>({...p,qty:e.target.value}))}
          onFocus={e=>e.target.select()}
          onBlur={e=>setVal(p=>({...p,qty:parseFloat(e.target.value)||1}))}
          style={{width:70,padding:"8px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:17,outline:"none"}}/>
        <select value={val.unit??item.unit} onChange={e=>setVal(p=>({...p,unit:e.target.value}))}
          style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:16,outline:"none"}}>
          {["Stück","kg","g","L","ml","Packung","Flasche","Dose","Glas","Beutel","Kasten"].map(u=><option key={u}>{u}</option>)}
        </select>
        <select value={item.shop||""} onChange={e=>onShop(item.id,e.target.value)}
          style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:15,outline:"none"}}>
          {ALLE_SHOPS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{onUpdate?.(item.id,{name:val.name??item.name,qty:parseFloat(val.qty??item.qty)||1,unit:val.unit??item.unit});setModus(null);}}
          style={{flex:1,padding:"10px",background:"#f59e0b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:17}}>✓</button>
        <button onClick={()=>setModus(null)} style={{padding:"10px 16px",background:"#e5e7eb",color:"#374151",border:"none",borderRadius:8,cursor:"pointer",fontSize:17}}>✕</button>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",alignItems:"center",padding:"11px 12px",borderBottom:last?"none":"1px solid #f3f4f6",opacity:item.erledigt?0.4:1,gap:8}}>
      <input type="checkbox" checked={item.erledigt} onChange={()=>onToggle(item.id)} style={{width:22,height:22,cursor:"pointer",accentColor:"#3d5c3f",flexShrink:0}}/>
      <div style={{flex:1,cursor:item.erledigt?"default":"pointer",textDecoration:item.erledigt?"line-through":"none"}} onClick={oeffneEinlagern}>
        <span style={{fontSize:19,fontWeight:700}}>{item.name}</span>
        <span style={{fontSize:16,color:"#6b7280",marginLeft:6}}>{item.qty} {item.unit}</span>
        {!item.erledigt && <span style={{fontSize:13,color:"#3d5c3f",marginLeft:5}}>→ einlagern</span>}
      </div>
      <select value={item.shop||""} onChange={e=>onShop(item.id,e.target.value)} style={{fontSize:13,border:"1px solid #e5e7eb",borderRadius:6,padding:"3px",maxWidth:70,flexShrink:0}}>
        {ALLE_SHOPS.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      <button onClick={()=>onRemove(item.id)} style={{background:"#fee2e2",border:"none",cursor:"pointer",color:"#dc2626",width:30,height:30,borderRadius:6,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>×</button>
    </div>
  );
};

// ── EINKAUF TAB ───────────────────────────────────────────
const EinkaufTab = ({einkauf, onAdd, onToggle, onRemove, onShop, onClear, onUpdate, onEinlagern, bestand}) => {
  const [gId, setGId] = useState("sm");
  const [shop, setShop] = useState("Kaufland");
  const [busy, setBusy] = useState(false);
  const [filter, setFilter] = useState("Alle");

  const gr = GRUPPEN.find(g=>g.id===gId);
  const wechsel = id => { setGId(id); const g=GRUPPEN.find(x=>x.id===id); setShop(g?.shops[0]||g?.name||""); };
  const defShop = () => { const g=GRUPPEN.find(x=>x.id===gId); return g?.shops.length ? shop : (g?.name||""); };

  const hinzufuegen = async txt => {
    setBusy(true);
    try {
      let items;
      try {
        items = await claudeCall(
          [{role:"user",content:txt}],
          `Extrahiere Einkaufsartikel. Shop aus:${ALLE_SHOPS.join(",")} sonst null. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück","shop":null}]`
        );
      } catch {
        items = parseText(txt).map(p=>({...p,shop:null}));
      }
      onAdd(items.map(i=>({...i, shop:i.shop||defShop()})));
    } catch(e) { console.error(e); }
    setBusy(false);
  };

  const fotoScan = async f => {
    setBusy(true);
    try {
      const {data,mt} = await zuBase64(f);
      const items = await claudeCall(
        [{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data}},{type:"text",text:"Einkaufsliste scannen."}]}],
        `Scanne Einkaufsliste. Shops:${ALLE_SHOPS.join(",")} oder null. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück","shop":null}]`
      );
      onAdd(items.map(i=>({...i,shop:i.shop||defShop()})));
    } catch { alert("Foto-Scan benötigt Anthropic API-Key."); }
    setBusy(false);
  };

  const done = einkauf.filter(i=>i.erledigt).length;
  const zeige = filter==="Alle" ? einkauf : einkauf.filter(i=>shopGruppe(i.shop)?.id===filter);
  
  // Gruppieren nach Gruppe → Shop
  const grps = {};
  zeige.forEach(item => {
    const g = shopGruppe(item.shop);
    const gk = g?.id||"x"; const sk = item.shop||"Sonstiges";
    if(!grps[gk]) grps[gk]={};
    if(!grps[gk][sk]) grps[gk][sk]=[];
    grps[gk][sk].push(item);
  });
  const belegt = GRUPPEN.filter(g=>einkauf.some(i=>shopGruppe(i.shop)?.id===g.id));

  return (
    <div>
      {/* Kategorie + Shop Auswahl */}
      <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <p style={{margin:"0 0 6px",fontSize:26,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Kategorie</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {GRUPPEN.map(g => (
            <button key={g.id} onClick={()=>wechsel(g.id)}
              style={{padding:"5px 9px",borderRadius:20,border:"2px solid",
                borderColor:gId===g.id?"#3d5c3f":"#e5e7eb",
                background:gId===g.id?"#3d5c3f":"white",
                color:gId===g.id?"white":"#374151",fontSize:24,cursor:"pointer",fontWeight:700}}>
              {g.icon} {g.name}
            </button>
          ))}
        </div>
        {gr?.shops.length > 0 && <>
          <p style={{margin:"0 0 5px",fontSize:26,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Shop</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {gr.shops.map(s => {
              const f=shopFarbe(s); const a=shop===s;
              return (
                <button key={s} onClick={()=>setShop(s)}
                  style={{padding:"5px 10px",borderRadius:20,border:"2px solid",
                    borderColor:a?f.bg:"#e5e7eb",background:a?f.bg:"white",
                    color:a?f.fg:"#374151",fontSize:24,cursor:"pointer",fontWeight:700}}>
                  {s}
                </button>
              );
            })}
          </div>
        </>}
        <EingabeFeld ph="Artikel eingeben… (Komma = mehrere)" onOK={txt => hinzufuegen(txt, neuSch)} onBild={fotoScan} busy={busy}/>
      </div>

      {/* Fortschritt */}
      {einkauf.length > 0 && (
        <div style={{background:"white",borderRadius:14,padding:12,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <span style={{fontSize:21,fontWeight:600}}>{done}/{einkauf.length} erledigt</span>
            {done>0 && <button onClick={onClear} style={{background:"#fee2e2",border:"none",color:"#dc2626",cursor:"pointer",fontSize:19,padding:"3px 8px",borderRadius:6,fontWeight:600}}>Erledigte löschen</button>}
          </div>
          <div style={{height:5,background:"#f3f4f6",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${einkauf.length?(done/einkauf.length)*100:0}%`,background:"linear-gradient(90deg,#3d5c3f,#4a7a4d)",borderRadius:3,transition:"width 0.3s"}}/>
          </div>
        </div>
      )}

      {/* Filter */}
      {belegt.length > 1 && (
        <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
          {["Alle",...belegt.map(g=>g.id)].map(f => {
            const g = GRUPPEN.find(x=>x.id===f);
            return <button key={f} onClick={()=>setFilter(f)} style={{padding:"4px 8px",borderRadius:20,border:"2px solid",borderColor:filter===f?"#3d5c3f":"#e5e7eb",background:filter===f?"#3d5c3f":"white",color:filter===f?"white":"#374151",fontSize:19,cursor:"pointer",fontWeight:600}}>{g?`${g.icon} ${g.name}`:"Alle"}</button>;
          })}
        </div>
      )}

      {/* Artikel nach Shop */}
      {Object.entries(grps).map(([gk, shops]) => {
        const g = GRUPPEN.find(x=>x.id===gk);
        return Object.entries(shops).map(([sn, items]) => {
          const f = shopFarbe(sn); const d = items.filter(i=>i.erledigt).length;
          return (
            <div key={`${gk}-${sn}`} style={{background:"white",borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
              <div style={{padding:"9px 14px",background:f.bg,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:f.fg,fontWeight:800,fontSize:13}}>{g?.icon} {sn}</span>
                <span style={{color:f.fg,fontSize:19,background:"rgba(0,0,0,0.18)",padding:"2px 7px",borderRadius:10}}>{d}/{items.length}</span>
              </div>
              {items.map((item,i) => (
                <EinkaufItem key={item.id} item={item} onToggle={onToggle} onRemove={onRemove} onShop={onShop} onUpdate={onUpdate} onEinlagern={onEinlagern} bestand={bestand||{}} last={i===items.length-1}/>
              ))}
            </div>
          );
        });
      })}

      {einkauf.length===0 && (
        <div style={{textAlign:"center",padding:"32px 16px",color:"#9ca3af"}}>
          <div style={{fontSize:36}}>🛒</div>
          <p style={{margin:"8px 0 4px",fontSize:26,fontWeight:600}}>Einkaufsliste ist leer</p>
          <p style={{fontSize:12}}>Kategorie & Shop wählen, dann Artikel eingeben</p>
        </div>
      )}
    </div>
  );
};

// ── ÜBERSICHT TAB ─────────────────────────────────────────
const UebersichtTab = ({bestand, einkauf, kassenbons, todos}) => {
  const gB = Object.values(bestand).reduce((s,a)=>s+a.length,0);
  const oE = einkauf.filter(i=>!i.erledigt).length;
  const oT = todos.filter(t=>!t.erledigt).length;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[{i:"📦",l:"Im Bestand",v:gB,c:"#3d5c3f"},{i:"🛒",l:"Einzukaufen",v:oE,c:"#dc2626"},{i:"🧾",l:"Kassenbons",v:kassenbons.length,c:"#6366f1"},{i:"✅",l:"Aufgaben",v:oT,c:"#f97316"}].map((k,i) => (
          <div key={i} style={{background:"white",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:20}}>{k.i}</div>
            <div style={{fontSize:26,fontWeight:800,color:k.c,marginTop:2}}>{k.v}</div>
            <div style={{fontSize:19,color:"#6b7280",marginTop:2}}>{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <h3 style={{margin:"0 0 10px",fontSize:26,fontWeight:800}}>📦 Bestand</h3>
        {BEREICHE.map(b => {
          const tot = b.orte.reduce((s,o)=>s+(bestand[o.id]||[]).length,0);
          return (
            <div key={b.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:21,fontWeight:700,padding:"3px 0",borderBottom:"1px solid #f3f4f6",marginBottom:3}}>
                <span>{b.icon} {b.name}</span><span style={{color:"#3d5c3f"}}>{tot}</span>
              </div>
              {b.orte.map(o => {const c=(bestand[o.id]||[]).length;return(
                <div key={o.id} style={{display:"flex",justifyContent:"space-between",padding:"2px 10px",fontSize:19,color:"#6b7280"}}>
                  <span>{o.icon} {o.name}</span>
                  <span style={{fontWeight:c?700:400,color:c?"#374151":"#d1d5db"}}>{c||"—"}</span>
                </div>
              );})}
            </div>
          );
        })}
      </div>
      <div style={{background:"white",borderRadius:14,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <h3 style={{margin:"0 0 10px",fontSize:26,fontWeight:800}}>🛒 Einkauf</h3>
        {GRUPPEN.map(g => {
          const items = einkauf.filter(i=>shopGruppe(i.shop)?.id===g.id);
          if (!items.length) return null;
          const d = items.filter(i=>i.erledigt).length;
          return (
            <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #f3f4f6",fontSize:12}}>
              <span>{g.icon} {g.name}</span>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{height:4,width:50,background:"#f3f4f6",borderRadius:2}}>
                  <div style={{height:"100%",width:`${(d/items.length)*100}%`,background:g.farbe,borderRadius:2}}/>
                </div>
                <span style={{fontWeight:700,color:d===items.length?"#3d5c3f":"#f97316"}}>{d}/{items.length}</span>
              </div>
            </div>
          );
        })}
        {!einkauf.length && <p style={{fontSize:24,color:"#9ca3af",margin:0}}>Keine Einkäufe</p>}
      </div>
    </div>
  );
};

// ── KASSENBON TAB ─────────────────────────────────────────
const KassenbonTab = ({kassenbons, setKassenbons, onAddEinkauf}) => {
  const [busy, setBusy] = useState(false);
  const [akt, setAkt] = useState(null);
  const ref = useRef();
  const scan = async e => {
    const f = e.target.files[0]; if(!f) return;
    setBusy(true);
    try {
      const {data,mt} = await zuBase64(f);
      const b = await claudeCall(
        [{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data}},{type:"text",text:"Kassenbon auslesen."}]}],
        `Lies Kassenbon. NUR JSON:{"store":"X","date":"X","total":"X","items":[{"name":"X","qty":1,"price":"X"}]}`
      );
      if(b){const n={...b,id:uid(),scanDatum:datum()};setAkt(n);setKassenbons(p=>[n,...p]);}
    } catch { alert("Kassenbons benötigen Anthropic API-Key (in Einstellungen eintragen)."); }
    setBusy(false); e.target.value="";
  };
  return (
    <div>
      <div style={{background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <h3 style={{margin:"0 0 10px",fontSize:19,fontWeight:800}}>🧾 Kassenbon einlesen</h3>
        <button onClick={()=>ref.current?.click()} disabled={busy}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"2px dashed #3d5c3f",background:"#f0f4f1",fontSize:26,cursor:"pointer",fontWeight:600,color:"#2c3e2d"}}>
          {busy?"⏳ Wird gelesen…":"📷 Kassenbon hochladen / fotografieren"}
        </button>
        <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={scan}/>
        <p style={{margin:"6px 0 0",fontSize:19,color:"#9ca3af",textAlign:"center"}}>Benötigt Anthropic API-Key</p>
      </div>
      {akt && (
        <div style={{background:"white",borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{padding:"12px 14px",background:"#2c3e2d",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{color:"white",fontWeight:800,fontSize:15}}>{akt.store||"?"}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{akt.date||akt.scanDatum} · {akt.total}</div></div>
            <button onClick={()=>setAkt(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",color:"white",width:28,height:28,borderRadius:8,fontSize:16}}>×</button>
          </div>
          <div style={{padding:"6px 14px"}}>
            {(akt.items||[]).map((item,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<akt.items.length-1?"1px solid #f3f4f6":"none",fontSize:13}}>
                <span>{item.qty>1?`${item.qty}× `:""}{item.name}</span>
                <span style={{color:"#6b7280",fontWeight:600}}>{item.price}</span>
              </div>
            ))}
          </div>
          <div style={{padding:"10px 14px",borderTop:"2px solid #f3f4f6"}}>
            <button onClick={()=>onAddEinkauf((akt.items||[]).map(i=>({name:i.name,qty:i.qty||1,unit:"Stück",shop:akt.store||"Kaufland"})))}
              style={{width:"100%",padding:"10px",background:"#3d5c3f",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:21,fontWeight:700}}>
              → Zur Einkaufsliste
            </button>
          </div>
        </div>
      )}
      {kassenbons.slice(0,10).map(b=>(
        <button key={b.id} onClick={()=>setAkt(b)} style={{width:"100%",background:"white",borderRadius:12,padding:"10px 14px",marginBottom:8,border:"1.5px solid",borderColor:akt?.id===b.id?"#3d5c3f":"#f3f4f6",cursor:"pointer",textAlign:"left",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>{b.store||"?"}</span><span style={{color:"#3d5c3f",fontWeight:800}}>{b.total}</span></div>
          <div style={{fontSize:19,color:"#9ca3af"}}>{b.scanDatum} · {(b.items||[]).length} Artikel</div>
        </button>
      ))}
      {!kassenbons.length&&!busy&&<div style={{textAlign:"center",padding:"32px",color:"#9ca3af"}}><div style={{fontSize:36}}>🧾</div><p style={{margin:"8px 0 0",fontSize:26,fontWeight:600}}>Keine Kassenbons</p></div>}
    </div>
  );
};

// ── AUFGABEN TAB ──────────────────────────────────────────
const AufgabenTab = ({todos, onAdd, onToggle, onRemove}) => {
  const [txt, setTxt] = useState("");
  const [prio, setPrio] = useState("normal");
  const PRIOS = [{id:"hoch",l:"🔴 Hoch",c:"#dc2626"},{id:"mittel",l:"🟡 Mittel",c:"#f59e0b"},{id:"normal",l:"🟢 Normal",c:"#3d5c3f"}];
  const sorted = [...todos].sort((a,b)=>{const o={hoch:0,mittel:1,normal:2};if(a.erledigt!==b.erledigt)return a.erledigt?1:-1;return(o[a.prioritaet]||2)-(o[b.prioritaet]||2);});
  const add = () => {if(!txt.trim())return;onAdd(txt.trim(),prio);setTxt("");};
  return (
    <div>
      <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <p style={{margin:"0 0 6px",fontSize:26,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Priorität</p>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {PRIOS.map(p=>(
            <button key={p.id} onClick={()=>setPrio(p.id)}
              style={{flex:1,padding:"7px 4px",borderRadius:10,border:"2px solid",borderColor:prio===p.id?p.c:"#e5e7eb",background:prio===p.id?p.c+"18":"white",color:prio===p.id?p.c:"#374151",fontSize:24,cursor:"pointer",fontWeight:700}}>
              {p.l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Neue Aufgabe…"
            style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1.5px solid #e5e7eb",fontSize:26,outline:"none",background:"#fafafa"}}/>
          <Btn onClick={add} disabled={!txt.trim()}>+</Btn>
        </div>
      </div>
      {todos.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[{v:todos.filter(t=>!t.erledigt).length,l:"Offen",c:"#f97316"},{v:todos.filter(t=>t.erledigt).length,l:"Erledigt",c:"#3d5c3f"}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"white",borderRadius:10,padding:"10px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:26,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:26,color:"#9ca3af"}}>{s.l}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{background:"white",borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        {!sorted.length
          ?<div style={{textAlign:"center",padding:"32px",color:"#9ca3af"}}><div style={{fontSize:36}}>✅</div><p style={{margin:"8px 0 0",fontSize:26,fontWeight:600}}>Keine Aufgaben</p></div>
          :sorted.map((t,i)=>{const p=PRIOS.find(x=>x.id===t.prioritaet)||PRIOS[2];return(
            <div key={t.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:i<sorted.length-1?"1px solid #f3f4f6":"none",opacity:t.erledigt?0.4:1,gap:10}}>
              <input type="checkbox" checked={t.erledigt} onChange={()=>onToggle(t.id)} style={{width:18,height:18,cursor:"pointer",accentColor:p.c,flexShrink:0}}/>
              <div style={{flex:1}}>
                <span style={{fontSize:26,fontWeight:600,textDecoration:t.erledigt?"line-through":"none"}}>{t.text}</span>
                <div style={{fontSize:26,color:p.c,fontWeight:700,marginTop:1}}>{p.l}</div>
              </div>
              <span style={{fontSize:21,color:"#d1d5db"}}>{t.datum}</span>
              <button onClick={()=>onRemove(t.id)} style={{background:"#fee2e2",border:"none",cursor:"pointer",color:"#dc2626",width:24,height:24,borderRadius:6,fontWeight:700,fontSize:21,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          );})}
      </div>
    </div>
  );
};

// ── HAUPT APP ─────────────────────────────────────────────
const App = () => {
  const [aktiv, setAktiv] = useState(!!lsGet("hm_fb"));
  const [tab, setTab] = useState("bestand");
  const [bestand, setBestand] = useState({});
  const [einkauf, setEinkauf] = useState([]);
  const [kassenbons, setKassenbons] = useState([]);
  const [todos, setTodos] = useState([]);
  const [geladen, setGeladen] = useState(false);
  const [sync, setSync] = useState("idle");
  const writing = useRef(false);

  const laden = useCallback(async (still=false) => {
    const fb = lsGet("hm_fb"); if(!fb) return;
    if(!still) setSync("syncing");
    try {
      const [b,e,k,t] = await Promise.all([fbLesen("bestand"),fbLesen("einkauf"),fbLesen("kassenbons"),fbLesen("todos")]);
      if(b && typeof b==="object") setBestand(b);
      if(e) setEinkauf(Array.isArray(e)?e:Object.values(e));
      if(k) setKassenbons(Array.isArray(k)?k:Object.values(k));
      if(t) setTodos(Array.isArray(t)?t:Object.values(t));
      setSync("ok");
    } catch { setSync("err"); }
    setGeladen(true);
  }, []);

  useEffect(() => { if(aktiv) laden(); }, [aktiv]);
  useEffect(() => {
    if(!aktiv) return;
    const iv = setInterval(() => { if(!writing.current) laden(true); }, 8000);
    return () => clearInterval(iv);
  }, [aktiv, laden]);

  const speichern = useCallback(async (path, data) => {
    writing.current=true; setSync("syncing");
    await fbSchreiben(path, data);
    setSync("ok"); writing.current=false;
  }, []);

  const addBestand = (id,items) => setBestand(p=>{const n={...p,[id]:[...(p[id]||[]),...items.map(i=>({...i,id:uid(),datum:datum()}))]};speichern("bestand",n);return n;});
  const remBestand = (id,iid) => setBestand(p=>{const n={...p,[id]:(p[id]||[]).filter(i=>i.id!==iid)};speichern("bestand",n);return n;});
  const addEinkauf = items => setEinkauf(p=>{const n=[...p,...items.map(i=>({...i,id:uid(),erledigt:false,datum:datum()}))];speichern("einkauf",n);return n;});
  const togEinkauf = id => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,erledigt:!i.erledigt}:i);speichern("einkauf",n);return n;});
  const remEinkauf = id => setEinkauf(p=>{const n=p.filter(i=>i.id!==id);speichern("einkauf",n);return n;});
  const shopEinkauf = (id,s) => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,shop:s}:i);speichern("einkauf",n);return n;});
  const updateEinkauf = (id,f) => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,...f}:i);speichern("einkauf",n);return n;});
  const einlagern = (item,ortId,sch) => {
    const neu = [{name:item.name,qty:item.qty,unit:item.unit,fach:sch??null}];
    setBestand(p=>{const n={...p,[ortId]:[...(p[ortId]||[]),...neu.map(i=>({...i,id:uid(),datum:datum()}))]};speichern("bestand",n);return n;});
    setEinkauf(p=>{const n=p.map(i=>i.id===item.id?{...i,erledigt:true}:i);speichern("einkauf",n);return n;});
  };
  const clearEinkauf = () => setEinkauf(p=>{const n=p.filter(i=>!i.erledigt);speichern("einkauf",n);return n;});
  const addTodo = (txt,pr) => setTodos(p=>{const n=[{id:uid(),text:txt,prioritaet:pr,erledigt:false,datum:datum()},...p];speichern("todos",n);return n;});
  const togTodo = id => setTodos(p=>{const n=p.map(t=>t.id===id?{...t,erledigt:!t.erledigt}:t);speichern("todos",n);return n;});
  const remTodo = id => setTodos(p=>{const n=p.filter(t=>t.id!==id);speichern("todos",n);return n;});
  const setKFn = fn => setKassenbons(p=>{const n=typeof fn==="function"?fn(p):fn;speichern("kassenbons",n);return n;});

  if(!aktiv) return <Einrichtung onStart={()=>setAktiv(true)}/>;

  if(!geladen) return (
    <div style={{width:"100%",minHeight:"100vh",background:"#f5f5f0",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#6b7280"}}>
      <span style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>🔄</span>
      <p style={{margin:0,fontSize:26,fontWeight:600}}>Lade Daten…</p>
    </div>
  );

  const gB = Object.values(bestand).reduce((s,a)=>s+a.length,0);
  const oE = einkauf.filter(i=>!i.erledigt).length;
  const oT = todos.filter(t=>!t.erledigt).length;
  const TABS = [{id:"bestand",l:"Bestand",i:"📦"},{id:"einkauf",l:"Einkauf",i:"🛒"},{id:"uebersicht",l:"Übersicht",i:"📊"},{id:"kassenbon",l:"Kassenbon",i:"🧾"},{id:"aufgaben",l:"Aufgaben",i:"✅"}];
  const sC = sync==="ok"?"#4ade80":sync==="err"?"#f87171":"#fbbf24";

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",width:"100%",minHeight:"100vh",background:"#f5f5f0",paddingBottom:72}}>
      <div style={{background:"linear-gradient(135deg,#2c3e2d,#3d5c3f)",padding:"14px 18px 10px",color:"white"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <h1 style={{margin:0,fontSize:19,fontWeight:800}}>🏠 Haushalt Manager</h1>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
            <span style={{fontSize:26,background:"rgba(255,255,255,0.15)",padding:"3px 7px",borderRadius:10,display:"flex",alignItems:"center",gap:3}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:sC,display:"inline-block"}}/>
              {sync==="ok"?"Sync ✓":sync==="err"?"❌ Fehler":"⏳"}
            </span>
            <button onClick={()=>{lsDel("hm_fb");setAktiv(false);setGeladen(false);}}
              style={{fontSize:21,background:"rgba(255,255,255,0.1)",border:"none",color:"rgba(255,255,255,0.7)",padding:"2px 6px",borderRadius:5,cursor:"pointer"}}>
              ⚙️ Einstellungen
            </button>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginTop:7,fontSize:19,opacity:0.85}}>
          <span>📦 {gB}</span><span>🛒 {oE} offen</span><span>✅ {oT} Aufgaben</span>
        </div>
      </div>

      <div style={{padding:12}}>
        {tab==="bestand"    && <BestandTab bestand={bestand} onAdd={addBestand} onRemove={remBestand}/>}
        {tab==="einkauf"    && <EinkaufTab einkauf={einkauf} onAdd={addEinkauf} onToggle={togEinkauf} onRemove={remEinkauf} onShop={shopEinkauf} onClear={clearEinkauf} onUpdate={updateEinkauf} onEinlagern={einlagern} bestand={bestand}/>}
        {tab==="uebersicht" && <UebersichtTab bestand={bestand} einkauf={einkauf} kassenbons={kassenbons} todos={todos}/>}
        {tab==="kassenbon"  && <KassenbonTab kassenbons={kassenbons} setKassenbons={setKFn} onAddEinkauf={addEinkauf}/>}
        {tab==="aufgaben"   && <AufgabenTab todos={todos} onAdd={addTodo} onToggle={togTodo} onRemove={remTodo}/>}
      </div>

      <nav style={{position:"fixed",bottom:0,left:0,width:"100%",background:"white",borderTop:"1px solid #e5e7eb",display:"flex",boxShadow:"0 -2px 10px rgba(0,0,0,0.08)",zIndex:100}}>
        {TABS.map(t=>{
          const badge = t.id==="einkauf"?oE : t.id==="aufgaben"?oT : 0;
          const a = tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"10px 2px 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"}}>
              <span style={{fontSize:18}}>{t.i}</span>
              <span style={{fontSize:21,fontWeight:a?700:400,color:a?"#3d5c3f":"#9ca3af"}}>{t.l}</span>
              {badge>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 15px)",background:"#dc2626",color:"white",fontSize:21,fontWeight:700,borderRadius:"50%",width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center"}}>{badge>9?"9+":badge}</span>}
              {a&&<div style={{position:"absolute",bottom:0,left:"15%",right:"15%",height:2,background:"#3d5c3f",borderRadius:2}}/>}
            </button>
          );
        })}
      </nav>
    </div>
  );
};

// Error boundary
class EB extends React.Component {
  constructor(p){super(p);this.state={e:null};}
  componentDidCatch(e){this.setState({e:e.message+"|"+e.stack?.slice(0,200)});}
  render(){
    if(this.state.e) return <div style={{padding:20,color:"red",fontSize:16,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>FEHLER: {this.state.e}</div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<EB><App/></EB>);
</script>
</body>
</html>

// ── Lokaler Parser (kein API nötig) ───────────────────────
function parseText(text) {
  const EINH = ["kg","g","l","ml","liter","stück","stk","packung","pack","flasche","dose","glas","beutel","becher","kasten","tüte","bund"];
  return text.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean).map(line => {
    const m = line.match(/^(\d+[.,]?\d*)\s*([a-zA-ZäöüÄÖÜ]{1,12})\s+(.+)$/);
    if (m && EINH.includes(m[2].toLowerCase())) return {name:m[3], qty:parseFloat(m[1].replace(",",".")), unit:m[2], sch:null};
    const n = line.match(/^(\d+)\s+(.+)$/);
    if (n) return {name:n[2], qty:parseInt(n[1]), unit:"Stück", sch:null};
    return {name:line, qty:1, unit:"Stück", sch:null};
  });
}

// ── Claude API ────────────────────────────────────────────
async function claudeCall(messages, system) {
  const key = lsGet("hm_key");
  if (!key) throw new Error("kein key");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:800, system, messages})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const t = d.content?.[0]?.text || "";
  return JSON.parse(t.replace(/```json|```/g,"").trim());
}

// ── Spracheingabe ─────────────────────────────────────────
const useSprache = cb => {
  const ref = useRef();
  const [an, setAn] = useState(false);
  const start = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Spracherkennung nicht verfügbar"); return; }
    const r = new SR(); r.lang="de-DE"; r.continuous=false; r.interimResults=false;
    r.onstart=()=>setAn(true); r.onend=()=>setAn(false); r.onerror=()=>setAn(false);
    r.onresult=e=>cb(e.results[0][0].transcript);
    ref.current=r; r.start();
  };
  const stop = () => { ref.current?.stop(); setAn(false); };
  return {an, start, stop};
};
const zuBase64 = f => new Promise((ok,err) => {
  const r = new FileReader();
  r.onload = () => ok({data:r.result.split(",")[1], mt:f.type});
  r.onerror = err; r.readAsDataURL(f);
});

// ── BESTAND TAB ───────────────────────────────────────────
const BestandTab = ({bestand, onAdd, onRemove}) => {
  const [bId, setBId] = useState("vr");
  const [oId, setOId] = useState("vr1");
  const [filtSch, setFiltSch] = useState(null);
  const [neuSch, setNeuSch] = useState(null);
  const [zuletzt, setZuletzt] = useState("");
  const [sortAZ, setSortAZ] = useState(false);
  const [busy, setBusy] = useState(false);

  const bereich = BEREICHE.find(b=>b.id===bId);
  const ort = ALLE_ORTE.find(o=>o.id===oId);
  const hatSch = (ort?.faecher||[]).length > 0;
  const alleItems = bestand[oId] || [];
  const items = filtSch===null ? alleItems : alleItems.filter(i=>i.sch===filtSch);

  const hinzufuegen = async (txt, gewSch) => {
    setBusy(true);
    try {
      let parsed;
      try {
        parsed = await claudeCall([{role:"user",content:txt}], `Extrahiere ALLE Lebensmittel. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück"}]`);
      } catch { parsed = parseText(txt); }
      if(parsed && parsed.length) {
        onAdd(oId, parsed.map(x=>({...x, fach: gewSch != null ? Number(gewSch) : null})));
        setZuletzt("✓ " + parsed.length + " Artikel" + (gewSch != null ? " → Schublade " + gewSch : ""));
        setTimeout(()=>setZuletzt(""), 3000);
      }
    } catch(e) { console.error(e); }
    setBusy(false);
  };


  return (
    <div>
      {/* Bereiche */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>

          <button key={b.id} onClick={()=>{setBId(b.id);setOId(b.orte[0].id);setFiltSch(null);}}
            style={{flex:1,padding:"8px 2px",borderRadius:10,border:"2px solid",
              borderColor:bId===b.id?"#3d5c3f":"#e5e7eb",
              background:bId===b.id?"#3d5c3f":"white",
              color:bId===b.id?"white":"#374151",fontSize:23,cursor:"pointer",fontWeight:700,lineHeight:1.3}}>
            {b.icon}<br/>{b.name}
          </button>
        ))}
      </div>

      {/* Orte */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>

            <button key={o.id} onClick={()=>{setOId(o.id);setFiltSch(null);}}
              style={{padding:"5px 10px",borderRadius:20,border:"2px solid",
                borderColor:oId===o.id?"#3d5c3f":"#e5e7eb",
                background:oId===o.id?"#f0f4f1":"white",
                color:"#374151",fontSize:26,cursor:"pointer",fontWeight:oId===o.id?700:400,
                display:"flex",alignItems:"center",gap:4}}>
              {o.icon} {o.name}

        })}

      {/* Schubladen-Filter */}

        <div style={{background:"white",borderRadius:12,padding:10,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

            <span style={{fontSize:26,fontWeight:700,color:"#9ca3af"}}>ANZEIGEN:</span>
            <SchBtn label="Alle" aktiv={filtSch===null} onClick={()=>setFiltSch(null)} n={alleItems.length}/>
            {(ort.faecher||[]).map(s=>(
              <SchBtn key={s} label={`Nr.${s}`} aktiv={filtSch===Number(s)} onClick={()=>setFiltSch(Number(s))} n={alleItems.filter(i=>Number(i.fach)===Number(s)).length}/>
            ))}
          </div>

            <span style={{fontSize:26,fontWeight:700,color:"#9ca3af"}}>NEUER ARTIKEL → SCH.:</span>
            <SchBtn label="–" aktiv={neuSch===null} onClick={()=>setNeuSch(null)} n={0}/>

                    <span style={{fontSize:16,color:"#6b7280",marginLeft:6}}>{item.qty} {item.unit}</span>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
        {ALLE_ORTE.map(o => {
          const cnt = (bestand[o.id]||[]).length;
          return (
            <button key={o.id} onClick={()=>{setBId(o.bId);setOId(o.id);setFiltSch(null);}}
              style={{background:"white",borderRadius:12,padding:"9px 11px",border:"1.5px solid",
                borderColor:oId===o.id?"#3d5c3f":"#f3f4f6",cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:16}}>{o.icon}</div>
              <div style={{fontSize:23,fontWeight:700,color:"#374151",marginTop:2,lineHeight:1.2}}>{o.name}</div>

              <div style={{fontSize:26,fontWeight:700,color:cnt?"#3d5c3f":"#d1d5db",marginTop:2}}>{cnt?`${cnt} Artikel`:"leer"}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
};

// ── EINKAUF TAB ───────────────────────────────────────────
const EinkaufTab = ({einkauf, onAdd, onToggle, onRemove, onShop, onClear, onUpdate, onEinlagern, bestand}) => {
  const [gId, setGId] = useState("sm");
  const [shop, setShop] = useState("Kaufland");
  const [busy, setBusy] = useState(false);
  const [filter, setFilter] = useState("Alle");

  const gr = GRUPPEN.find(g=>g.id===gId);
  const wechsel = id => { setGId(id); const g=GRUPPEN.find(x=>x.id===id); setShop(g?.shops[0]||g?.name||""); };
  const defShop = () => { const g=GRUPPEN.find(x=>x.id===gId); return g?.shops.length ? shop : (g?.name||""); };

  const hinzufuegen = async txt => {
    setBusy(true);
    try {
      let items;
      try {
        items = await claudeCall(
          [{role:"user",content:txt}],
          `Extrahiere Einkaufsartikel. Shop aus:${ALLE_SHOPS.join(",")} sonst null. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück","shop":null}]`
        );
      } catch {
        items = parseText(txt).map(p=>({...p,shop:null}));
      }
      onAdd(items.map(i=>({...i, shop:i.shop||defShop()})));
    } catch(e) { console.error(e); }
    setBusy(false);
  };

  const fotoScan = async f => {
    setBusy(true);
    try {
      const {data,mt} = await zuBase64(f);
      const items = await claudeCall(
        [{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data}},{type:"text",text:"Einkaufsliste scannen."}]}],
        `Scanne Einkaufsliste. Shops:${ALLE_SHOPS.join(",")} oder null. NUR JSON-Array:[{"name":"X","qty":1,"unit":"Stück","shop":null}]`
      );
      onAdd(items.map(i=>({...i,shop:i.shop||defShop()})));
    } catch { alert("Foto-Scan benötigt Anthropic API-Key."); }
    setBusy(false);
  };

  const done = einkauf.filter(i=>i.erledigt).length;
  const zeige = filter==="Alle" ? einkauf : einkauf.filter(i=>shopGruppe(i.shop)?.id===filter);
  
  // Gruppieren nach Gruppe → Shop
  const grps = {};
  zeige.forEach(item => {
    const g = shopGruppe(item.shop);
    const gk = g?.id||"x"; const sk = item.shop||"Sonstiges";
    if(!grps[gk]) grps[gk]={};
    if(!grps[gk][sk]) grps[gk][sk]=[];
    grps[gk][sk].push(item);
  });
  const belegt = GRUPPEN.filter(g=>einkauf.some(i=>shopGruppe(i.shop)?.id===g.id));

  return (
    <div>
      {/* Kategorie + Shop Auswahl */}
      <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <p style={{margin:"0 0 6px",fontSize:26,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Kategorie</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {GRUPPEN.map(g => (
            <button key={g.id} onClick={()=>wechsel(g.id)}
              style={{padding:"5px 9px",borderRadius:20,border:"2px solid",
                borderColor:gId===g.id?"#3d5c3f":"#e5e7eb",
                background:gId===g.id?"#3d5c3f":"white",
                color:gId===g.id?"white":"#374151",fontSize:26,cursor:"pointer",fontWeight:700}}>
              {g.icon} {g.name}
            </button>
          ))}
        </div>
        {gr?.shops.length > 0 && <>
          <p style={{margin:"0 0 5px",fontSize:26,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Shop</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {gr.shops.map(s => {
              const f=shopFarbe(s); const a=shop===s;
              return (
                <button key={s} onClick={()=>setShop(s)}
                  style={{padding:"5px 10px",borderRadius:20,border:"2px solid",
                    borderColor:a?f.bg:"#e5e7eb",background:a?f.bg:"white",
                    color:a?f.fg:"#374151",fontSize:26,cursor:"pointer",fontWeight:700}}>
                  {s}
                </button>
              );
            })}
          </div>
        </>}
        <EingabeFeld ph="Artikel eingeben… (Komma = mehrere)" onOK={txt => hinzufuegen(txt, neuSch)} onBild={fotoScan} busy={busy}/>
      </div>

      {/* Fortschritt */}
      {einkauf.length > 0 && (
        <div style={{background:"white",borderRadius:14,padding:12,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <span style={{fontSize:26,fontWeight:800}}>{done}/{einkauf.length} erledigt</span>
            {done>0 && <button onClick={onClear} style={{background:"#fee2e2",border:"none",color:"#dc2626",cursor:"pointer",fontSize:23,padding:"3px 8px",borderRadius:6,fontWeight:800}}>Erledigte löschen</button>}
          </div>
          <div style={{height:5,background:"#f3f4f6",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${einkauf.length?(done/einkauf.length)*100:0}%`,background:"linear-gradient(90deg,#3d5c3f,#4a7a4d)",borderRadius:3,transition:"width 0.3s"}}/>
          </div>
        </div>
      )}

      {/* Filter */}
      {belegt.length > 1 && (
        <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
          {["Alle",...belegt.map(g=>g.id)].map(f => {
            const g = GRUPPEN.find(x=>x.id===f);
            return <button key={f} onClick={()=>setFilter(f)} style={{padding:"4px 8px",borderRadius:20,border:"2px solid",borderColor:filter===f?"#3d5c3f":"#e5e7eb",background:filter===f?"#3d5c3f":"white",color:filter===f?"white":"#374151",fontSize:23,cursor:"pointer",fontWeight:800}}>{g?`${g.icon} ${g.name}`:"Alle"}</button>;
          })}
        </div>
      )}

      {/* Artikel nach Shop */}
      {Object.entries(grps).map(([gk, shops]) => {
        const g = GRUPPEN.find(x=>x.id===gk);
        return Object.entries(shops).map(([sn, items]) => {
          const f = shopFarbe(sn); const d = items.filter(i=>i.erledigt).length;
          return (
            <div key={`${gk}-${sn}`} style={{background:"white",borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
              <div style={{padding:"9px 14px",background:f.bg,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:f.fg,fontWeight:800,fontSize:13}}>{g?.icon} {sn}</span>
                <span style={{color:f.fg,fontSize:23,background:"rgba(0,0,0,0.18)",padding:"2px 7px",borderRadius:10}}>{d}/{items.length}</span>
              </div>
              {items.map((item,i) => (
                <EinkaufItem key={item.id} item={item} onToggle={onToggle} onRemove={onRemove} onShop={onShop} onUpdate={onUpdate} onEinlagern={onEinlagern} bestand={bestand||{}} last={i===items.length-1}/>
              ))}
            </div>
          );
        });
      })}

      {einkauf.length===0 && (
        <div style={{textAlign:"center",padding:"32px 16px",color:"#9ca3af"}}>
          <div style={{fontSize:36}}>🛒</div>
          <p style={{margin:"8px 0 4px",fontSize:26,fontWeight:800}}>Einkaufsliste ist leer</p>
          <p style={{fontSize:12}}>Kategorie & Shop wählen, dann Artikel eingeben</p>
        </div>
      )}
    </div>
  );
};

// ── KASSENBON TAB ─────────────────────────────────────────
const KassenbonTab = ({kassenbons, setKassenbons, onAddEinkauf}) => {
  const [busy, setBusy] = useState(false);
  const [akt, setAkt] = useState(null);
  const ref = useRef();
  const scan = async e => {
    const f = e.target.files[0]; if(!f) return;
    setBusy(true);
    try {
      const {data,mt} = await zuBase64(f);
      const b = await claudeCall(
        [{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data}},{type:"text",text:"Kassenbon auslesen."}]}],
        `Lies Kassenbon. NUR JSON:{"store":"X","date":"X","total":"X","items":[{"name":"X","qty":1,"price":"X"}]}`
      );
      if(b){const n={...b,id:uid(),scanDatum:datum()};setAkt(n);setKassenbons(p=>[n,...p]);}
    } catch { alert("Kassenbons benötigen Anthropic API-Key (in Einstellungen eintragen)."); }
    setBusy(false); e.target.value="";
  };
  return (
    <div>
      <div style={{background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <h3 style={{margin:"0 0 10px",fontSize:23,fontWeight:800}}>🧾 Kassenbon einlesen</h3>
        <button onClick={()=>ref.current?.click()} disabled={busy}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"2px dashed #3d5c3f",background:"#f0f4f1",fontSize:26,cursor:"pointer",fontWeight:700,color:"#2c3e2d"}}>
          {busy?"⏳ Wird gelesen…":"📷 Kassenbon hochladen / fotografieren"}
        </button>
        <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={scan}/>
        <p style={{margin:"6px 0 0",fontSize:23,color:"#9ca3af",textAlign:"center"}}>Benötigt Anthropic API-Key</p>
      </div>
      {akt && (
        <div style={{background:"white",borderRadius:14,marginBottom:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{padding:"12px 14px",background:"#2c3e2d",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{color:"white",fontWeight:800,fontSize:15}}>{akt.store||"?"}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{akt.date||akt.scanDatum} · {akt.total}</div></div>
            <button onClick={()=>setAkt(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",cursor:"pointer",color:"white",width:28,height:28,borderRadius:8,fontSize:16}}>×</button>
          </div>
          <div style={{padding:"6px 14px"}}>
            {(akt.items||[]).map((item,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<akt.items.length-1?"1px solid #f3f4f6":"none",fontSize:13}}>
                <span>{item.qty>1?`${item.qty}× `:""}{item.name}</span>
                <span style={{color:"#6b7280",fontWeight:800}}>{item.price}</span>
              </div>
            ))}
          </div>
          <div style={{padding:"10px 14px",borderTop:"2px solid #f3f4f6"}}>
            <button onClick={()=>onAddEinkauf((akt.items||[]).map(i=>({name:i.name,qty:i.qty||1,unit:"Stück",shop:akt.store||"Kaufland"})))}
              style={{width:"100%",padding:"10px",background:"#3d5c3f",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:26,fontWeight:700}}>
              → Zur Einkaufsliste
            </button>
          </div>
        </div>
      )}
      {kassenbons.slice(0,10).map(b=>(
        <button key={b.id} onClick={()=>setAkt(b)} style={{width:"100%",background:"white",borderRadius:12,padding:"10px 14px",marginBottom:8,border:"1.5px solid",borderColor:akt?.id===b.id?"#3d5c3f":"#f3f4f6",cursor:"pointer",textAlign:"left",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:13}}>{b.store||"?"}</span><span style={{color:"#3d5c3f",fontWeight:800}}>{b.total}</span></div>
          <div style={{fontSize:23,color:"#9ca3af"}}>{b.scanDatum} · {(b.items||[]).length} Artikel</div>
        </button>
      ))}
      {!kassenbons.length&&!busy&&<div style={{textAlign:"center",padding:"32px",color:"#9ca3af"}}><div style={{fontSize:36}}>🧾</div><p style={{margin:"8px 0 0",fontSize:26,fontWeight:800}}>Keine Kassenbons</p></div>}
    </div>
  );
};

// ── AUFGABEN TAB ──────────────────────────────────────────
const TodoArtikel = ({todo, onToggle, onRemove, onUpdate, PRIOS}) => {
  const [edit, setEdit] = useState(false);
  const [val, setVal] = useState({});
  const [neuerSub, setNeuerSub] = useState("");
  const p = PRIOS.find(x=>x.id===todo.prioritaet)||PRIOS[2];

  const speichern = () => {
    onUpdate(todo.id, {
      text: val.text ?? todo.text,
      prioritaet: val.prioritaet ?? todo.prioritaet,
      subs: val.subs ?? todo.subs ?? []
    });
    setEdit(false);
  };

  const addSub = () => {
    if(!neuerSub.trim()) return;
    const subs = [...(todo.subs||[]), {id:uid(), text:neuerSub.trim(), erledigt:false}];
    onUpdate(todo.id, {subs});
    setNeuerSub("");
  };

  const togSub = (sid) => {
    const subs = (todo.subs||[]).map(s=>s.id===sid?{...s,erledigt:!s.erledigt}:s);
    onUpdate(todo.id, {subs});
  };

  const delSub = (sid) => {
    const subs = (todo.subs||[]).filter(s=>s.id!==sid);
    onUpdate(todo.id, {subs});
  };

  if(edit) return (
    <div style={{padding:"12px 14px",background:"#f0f9f0",borderRadius:10,marginBottom:6,border:"2px solid #3d5c3f"}}>
      <input value={val.text??todo.text} onChange={e=>setVal(p=>({...p,text:e.target.value}))}
        autoFocus style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"2px solid #3d5c3f",fontSize:20,fontWeight:700,outline:"none",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {PRIOS.map(pr=>(
          <button key={pr.id} onClick={()=>setVal(p=>({...p,prioritaet:pr.id}))}
            style={{flex:1,padding:"8px",borderRadius:8,border:"2px solid",borderColor:(val.prioritaet??todo.prioritaet)===pr.id?pr.c:"#e5e7eb",background:(val.prioritaet??todo.prioritaet)===pr.id?pr.c+"22":"white",color:pr.c,fontSize:15,cursor:"pointer",fontWeight:700}}>
            {pr.l}
          </button>
        ))}
      </div>
      <p style={{fontSize:15,fontWeight:700,color:"#6b7280",margin:"0 0 6px"}}>Unterpunkte:</p>
      {(val.subs??todo.subs??[]).map((s,i)=>(
        <div key={s.id} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
          <span style={{fontSize:16,color:"#6b7280",width:20}}>{i+1}.</span>
          <span style={{flex:1,fontSize:16}}>{s.text}</span>
          <button onClick={()=>delSub(s.id)} style={{background:"#fee2e2",border:"none",color:"#dc2626",borderRadius:6,width:26,height:26,cursor:"pointer",fontWeight:700,fontSize:15}}>×</button>
        </div>
      ))}
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <input value={neuerSub} onChange={e=>setNeuerSub(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSub()}
          placeholder="Neuer Unterpunkt…" style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:16,outline:"none"}}/>
        <button onClick={addSub} style={{padding:"8px 14px",background:"#3d5c3f",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:18,fontWeight:700}}>+</button>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={speichern} style={{flex:1,padding:"10px",background:"#3d5c3f",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:18}}>✓ Speichern</button>
        <button onClick={()=>setEdit(false)} style={{padding:"10px 16px",background:"#e5e7eb",color:"#374151",border:"none",borderRadius:8,cursor:"pointer",fontSize:18}}>✕</button>
      </div>
    </div>
  );

  const subs = todo.subs||[];
  const subsDone = subs.filter(s=>s.erledigt).length;
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",padding:"11px 14px",background:"white",borderRadius:subs.length?"10px 10px 0 0":"10px",gap:8,cursor:"pointer",opacity:todo.erledigt?0.5:1,borderLeft:`4px solid ${p.c}`}}
        onClick={()=>setEdit(true)}>
        <input type="checkbox" checked={todo.erledigt} onChange={e=>{e.stopPropagation();onToggle(todo.id);}}
          style={{width:22,height:22,cursor:"pointer",accentColor:p.c,flexShrink:0}} onClick={e=>e.stopPropagation()}/>
        <div style={{flex:1}}>
          <span style={{fontSize:20,fontWeight:800,textDecoration:todo.erledigt?"line-through":"none"}}>{todo.text}</span>
          {subs.length>0 && <span style={{fontSize:14,color:"#9ca3af",marginLeft:8}}>{subsDone}/{subs.length}</span>}
          <div style={{fontSize:13,color:p.c,fontWeight:700,marginTop:1}}>{p.l} · {todo.datum}</div>
        </div>
        <span style={{fontSize:12,color:"#c0c9c0"}}>✏️</span>
        <button onClick={e=>{e.stopPropagation();onRemove(todo.id);}} style={{background:"#fee2e2",border:"none",cursor:"pointer",color:"#dc2626",width:30,height:30,borderRadius:7,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>×</button>
      </div>
      {subs.length>0 && (
        <div style={{background:"#fafafa",borderRadius:"0 0 10px 10px",border:"1px solid #f0f0f0",borderTop:"none",padding:"6px 14px"}}>
          {subs.map((s,i)=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",opacity:s.erledigt?0.5:1}}>
              <span style={{fontSize:15,color:"#9ca3af",width:18,fontWeight:700}}>{i+1}.</span>
              <input type="checkbox" checked={s.erledigt} onChange={()=>togSub(s.id)} style={{width:18,height:18,accentColor:p.c,flexShrink:0}}/>
              <span style={{flex:1,fontSize:17,textDecoration:s.erledigt?"line-through":"none"}}>{s.text}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const AufgabenTab = ({todos, todosAnnelie, onAdd, onAddAnnelie, onToggle, onToggleAnnelie, onRemove, onRemoveAnnelie, onUpdate, onUpdateAnnelie}) => {
  const [txt, setTxt] = useState("");
  const [prio, setPrio] = useState("normal");
  const [aktListe, setAktListe] = useState("hj");
  const PRIOS = [{id:"hoch",l:"🔴 Hoch",c:"#dc2626"},{id:"mittel",l:"🟡 Mittel",c:"#f59e0b"},{id:"normal",l:"🟢 Normal",c:"#3d5c3f"}];
  const kalAn = lsGet("hm_kal")==="1";

  const aktTodos = aktListe==="hj" ? todos : todosAnnelie;
  const aktOnAdd = aktListe==="hj" ? onAdd : onAddAnnelie;
  const aktOnToggle = aktListe==="hj" ? onToggle : onToggleAnnelie;
  const aktOnRemove = aktListe==="hj" ? onRemove : onRemoveAnnelie;
  const aktOnUpdate = aktListe==="hj" ? onUpdate : onUpdateAnnelie;

  // Sort: by prio (hoch→mittel→normal), then by date (oldest first), erledigt last
  const prioOrder = {hoch:0, mittel:1, normal:2};
  const sorted = [...aktTodos].sort((a,b)=>{
    if(a.erledigt!==b.erledigt) return a.erledigt?1:-1;
    const pd = (prioOrder[a.prioritaet]??2)-(prioOrder[b.prioritaet]??2);
    if(pd!==0) return pd;
    // Neuestes Datum oben (absteigend)
    return (b.datum||"").localeCompare(a.datum||"");
  });

  const add = () => {
    if(!txt.trim()) return;
    aktOnAdd(txt.trim(), prio);
    if(kalAn) {
      try {
        const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${(prio==="hoch"?"🔴 ":prio==="mittel"?"🟡 ":"🟢 ")+txt.trim()}
DTSTART:${new Date().toISOString().replace(/[-:.]/g,"").slice(0,15)}Z
DTEND:${new Date(Date.now()+3600000).toISOString().replace(/[-:.]/g,"").slice(0,15)}Z
END:VEVENT
END:VCALENDAR`;
        const blob = new Blob([ics],{type:"text/calendar"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="aufgabe.ics"; a.click();
      } catch(e) {}
    }
    setTxt("");
  };

  const offen = sorted.filter(t=>!t.erledigt).length;
  const erledigt = sorted.filter(t=>t.erledigt).length;

  return (
    <div>
      {/* Listen-Auswahl */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[{id:"hj",l:"👤 HJ"},{id:"annelie",l:"👤 Annelie"}].map(l=>(
          <button key={l.id} onClick={()=>setAktListe(l.id)}
            style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid",borderColor:aktListe===l.id?"#3d5c3f":"#e5e7eb",background:aktListe===l.id?"#3d5c3f":"white",color:aktListe===l.id?"white":"#374151",fontSize:18,fontWeight:800,cursor:"pointer"}}>
            {l.l}
          </button>
        ))}
      </div>

      {/* Kalender Status */}
      <div style={{background:kalAn?"#e8f3e8":"#f3f4f6",borderRadius:10,padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:16,fontWeight:700,color:kalAn?"#2c5f2e":"#6b7280"}}>{kalAn?"📅 Kalender aktiv":"📅 Kalender aus"}</span>
        <button onClick={()=>{lsSet("hm_kal",kalAn?"0":"1");window.location.reload();}}
          style={{padding:"4px 12px",borderRadius:8,border:"none",background:kalAn?"#dc2626":"#3d5c3f",color:"white",fontSize:14,cursor:"pointer",fontWeight:700}}>
          {kalAn?"Aus":"Ein"}
        </button>
      </div>

      {/* Eingabe */}
      <div style={{background:"white",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {PRIOS.map(p=>(
            <button key={p.id} onClick={()=>setPrio(p.id)}
              style={{flex:1,padding:"8px 4px",borderRadius:10,border:"2px solid",borderColor:prio===p.id?p.c:"#e5e7eb",background:prio===p.id?p.c+"18":"white",color:prio===p.id?p.c:"#374151",fontSize:16,cursor:"pointer",fontWeight:700}}>
              {p.l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
            placeholder={`Aufgabe für ${aktListe==="hj"?"HJ":"Annelie"}…`}
            style={{flex:1,padding:"12px 14px",borderRadius:10,border:"1.5px solid #e5e7eb",fontSize:18,fontWeight:700,outline:"none",background:"#fafafa"}}/>
          <button onClick={add} disabled={!txt.trim()} style={{padding:"12px 16px",background:!txt.trim()?"#e5e7eb":"#3d5c3f",color:!txt.trim()?"#9ca3af":"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:22,fontWeight:800}}>+</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1,background:"white",borderRadius:10,padding:"10px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:26,fontWeight:900,color:"#f97316"}}>{offen}</div>
          <div style={{fontSize:14,color:"#9ca3af"}}>Offen</div>
        </div>
        <div style={{flex:1,background:"white",borderRadius:10,padding:"10px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:26,fontWeight:900,color:"#3d5c3f"}}>{erledigt}</div>
          <div style={{fontSize:14,color:"#9ca3af"}}>Erledigt</div>
        </div>
      </div>

      {/* Liste */}
      {!sorted.length
        ? <div style={{textAlign:"center",padding:"32px",color:"#9ca3af"}}><div style={{fontSize:40}}>✅</div><p style={{margin:"8px 0 0",fontSize:18,fontWeight:700}}>Keine Aufgaben</p></div>
        : sorted.map(t=>(
            <TodoArtikel key={t.id} todo={t} onToggle={aktOnToggle} onRemove={aktOnRemove} onUpdate={aktOnUpdate} PRIOS={PRIOS}/>
          ))
      }
    </div>
  );
};

const App = () => {
  const [aktiv, setAktiv] = useState(!!lsGet("hm_fb"));
  const [tab, setTab] = useState("bestand");
  const [bestand, setBestand] = useState({});
  const [einkauf, setEinkauf] = useState([]);
  const [kassenbons, setKassenbons] = useState([]);
  const [todos, setTodos] = useState([]);
  const [todosAnnelie, setTodosAnnelie] = useState([]);
  const [geladen, setGeladen] = useState(false);
  const [sync, setSync] = useState("idle");
  const writing = useRef(false);

  const laden = useCallback(async (still=false) => {
    const fb = lsGet("hm_fb"); if(!fb) return;
    if(!still) setSync("syncing");
    // Cache-first: sofort aus lokalem Cache laden
    if(!still) {
      const paths = ["bestand","einkauf","kassenbons","todos","todosAnnelie"];
      const setters = [
        v=>{ if(v&&typeof v==="object") setBestand(v); },
        v=>{ if(v){ const a=Array.isArray(v)?v:Object.values(v); setEinkauf(a); }},
        v=>{ if(v){ const a=Array.isArray(v)?v:Object.values(v); setKassenbons(a); }},
        v=>{ if(v){ const a=Array.isArray(v)?v:Object.values(v); setTodos(a); }},
        v=>{ if(v){ const a=Array.isArray(v)?v:Object.values(v); setTodosAnnelie(a); }},
      ];
      paths.forEach((p,i) => { const c=cacheGet(p); if(c) setters[i](c); });
      setGeladen(true); // App sofort zeigen
    }
    try {
      const [b,e,k,t,ta] = await Promise.all([
        fbLesen("bestand"),fbLesen("einkauf"),fbLesen("kassenbons"),
        fbLesen("todos"),fbLesen("todosAnnelie")
      ]);
      if(b && typeof b==="object") { setBestand(b); cacheSet("bestand",b); }
      if(e) { const a=Array.isArray(e)?e:Object.values(e); setEinkauf(a); cacheSet("einkauf",a); }
      if(k) { const a=Array.isArray(k)?k:Object.values(k); setKassenbons(a); cacheSet("kassenbons",a); }
      if(t) { const a=Array.isArray(t)?t:Object.values(t); setTodos(a); cacheSet("todos",a); }
      if(ta) { const a=Array.isArray(ta)?ta:Object.values(ta); setTodosAnnelie(a); cacheSet("todosAnnelie",a); }
      setSync("ok");
    } catch { setSync(cacheGet("einkauf")?"cache":"err"); }
    setGeladen(true);
  }, []);

  useEffect(() => { if(aktiv) laden(); }, [aktiv]);
  useEffect(() => {
    if(!aktiv) return;
    const iv = setInterval(() => { if(!writing.current) laden(true); }, 8000);
    return () => clearInterval(iv);
  }, [aktiv, laden]);

  const speichern = useCallback(async (path, data) => {
    writing.current=true; setSync("syncing");
    await fbSchreiben(path, data);
    setSync("ok"); writing.current=false;
  }, []);

  const addBestand = (id,items) => setBestand(p=>{const n={...p,[id]:[...(p[id]||[]),...items.map(i=>({...i,id:uid(),datum:datum()}))]};speichern("bestand",n);return n;});
  const remBestand = (id,iid) => setBestand(p=>{const n={...p,[id]:(p[id]||[]).filter(i=>i.id!==iid)};speichern("bestand",n);return n;});
  const addEinkauf = items => setEinkauf(p=>{const n=[...p,...items.map(i=>({...i,id:uid(),erledigt:false,datum:datum()}))];speichern("einkauf",n);cacheSet("einkauf",n);return n;});
  const togEinkauf = id => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,erledigt:!i.erledigt}:i);speichern("einkauf",n);return n;});
  const remEinkauf = id => setEinkauf(p=>{const n=p.filter(i=>i.id!==id);speichern("einkauf",n);return n;});
  const shopEinkauf = (id,s) => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,shop:s}:i);speichern("einkauf",n);return n;});
  const updateEinkauf = (id,f) => setEinkauf(p=>{const n=p.map(i=>i.id===id?{...i,...f}:i);speichern("einkauf",n);return n;});
  const einlagern = (item,ortId,sch) => {
    const neu = [{name:item.name,qty:item.qty,unit:item.unit,fach:sch??null}];
    setBestand(p=>{const n={...p,[ortId]:[...(p[ortId]||[]),...neu.map(i=>({...i,id:uid(),datum:datum()}))]};speichern("bestand",n);return n;});
    setEinkauf(p=>{const n=p.map(i=>i.id===item.id?{...i,erledigt:true}:i);speichern("einkauf",n);return n;});
  };
  const clearEinkauf = () => setEinkauf(p=>{const n=p.filter(i=>!i.erledigt);speichern("einkauf",n);return n;});
  const addTodo = (txt,pr) => setTodos(p=>{const n=[{id:uid(),text:txt,prioritaet:pr,erledigt:false,datum:datum(),subs:[]},...p];speichern("todos",n);return n;});
  const addTodoAnnelie = (txt,pr) => setTodosAnnelie(p=>{const n=[{id:uid(),text:txt,prioritaet:pr,erledigt:false,datum:datum(),subs:[]},...p];speichern("todosAnnelie",n);return n;});
  const togTodo = id => setTodos(p=>{const n=p.map(t=>t.id===id?{...t,erledigt:!t.erledigt}:t);speichern("todos",n);return n;});
  const togTodoAnnelie = id => setTodosAnnelie(p=>{const n=p.map(t=>t.id===id?{...t,erledigt:!t.erledigt}:t);speichern("todosAnnelie",n);return n;});
  const remTodo = id => setTodos(p=>{const n=p.filter(t=>t.id!==id);speichern("todos",n);return n;});
  const remTodoAnnelie = id => setTodosAnnelie(p=>{const n=p.filter(t=>t.id!==id);speichern("todosAnnelie",n);return n;});
  const updateTodo = (id,f) => setTodos(p=>{const n=p.map(t=>t.id===id?{...t,...f}:t);speichern("todos",n);return n;});
  const updateTodoAnnelie = (id,f) => setTodosAnnelie(p=>{const n=p.map(t=>t.id===id?{...t,...f}:t);speichern("todosAnnelie",n);return n;});
  const setKFn = fn => setKassenbons(p=>{const n=typeof fn==="function"?fn(p):fn;speichern("kassenbons",n);return n;});

  if(!aktiv) return <Einrichtung onStart={()=>setAktiv(true)}/>;

  if(!geladen) return (
    <div style={{width:"100%",minHeight:"100vh",background:"#f5f5f0",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#6b7280"}}>
      <span style={{fontSize:40,animation:"spin 1s linear infinite",display:"inline-block"}}>🔄</span>
      <p style={{margin:0,fontSize:26,fontWeight:800}}>Lade Daten…</p>
    </div>
  );

  const gB = Object.values(bestand).reduce((s,a)=>s+a.length,0);
  const oE = einkauf.filter(i=>!i.erledigt).length;
  const oT = todos.filter(t=>!t.erledigt).length + todosAnnelie.filter(t=>!t.erledigt).length;
  const TABS = [{id:"bestand",l:"Bestand",i:"📦"},{id:"einkauf",l:"Einkauf",i:"🛒"},{id:"nonfood",l:"Keller 2",i:"📦"},{id:"kassenbon",l:"Kassenbon",i:"🧾"},{id:"aufgaben",l:"Aufgaben",i:"✅"}];
  const sC = sync==="ok"?"#4ade80":sync==="err"?"#f87171":"#fbbf24";
  const kalAktiv = lsGet("hm_kal")==="1";

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",width:"100%",minHeight:"100vh",background:"#f5f5f0",paddingBottom:72}}>
      <div style={{background:"linear-gradient(135deg,#2c3e2d,#3d5c3f)",padding:"14px 18px 10px",color:"white"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <h1 style={{margin:0,fontSize:23,fontWeight:800}}>🏠 Haushalt Manager</h1>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
            <span style={{fontSize:26,background:"rgba(255,255,255,0.15)",padding:"3px 7px",borderRadius:10,display:"flex",alignItems:"center",gap:3}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:sC,display:"inline-block"}}/>
              {sync==="ok"?"Sync ✓":sync==="err"?"❌ Fehler":"⏳"}
            </span>
            <button onClick={()=>{lsDel("hm_fb");setAktiv(false);setGeladen(false);}}
              style={{fontSize:26,background:"rgba(255,255,255,0.1)",border:"none",color:"rgba(255,255,255,0.7)",padding:"2px 6px",borderRadius:5,cursor:"pointer"}}>
              ⚙️ Einstellungen
            </button>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginTop:7,fontSize:23,opacity:0.85}}>
          <span>📦 {gB}</span><span>🛒 {oE} offen</span><span>✅ {oT} Aufgaben</span>{kalAktiv&&<span>📅 Kalender</span>}
        </div>
      </div>

      <div style={{padding:12}}>
        {tab==="bestand"    && <BestandTab bestand={bestand} onAdd={addBestand} onRemove={remBestand}/>}
        {tab==="einkauf"    && <EinkaufTab einkauf={einkauf} onAdd={addEinkauf} onToggle={togEinkauf} onRemove={remEinkauf} onShop={shopEinkauf} onClear={clearEinkauf} onUpdate={updateEinkauf} onEinlagern={einlagern} bestand={bestand}/>}
        {tab==="uebersicht" && <UebersichtTab bestand={bestand} einkauf={einkauf} kassenbons={kassenbons} todos={todos}/>}
        {tab==="nonfood"    && <NonfoodTab bestand={bestand} onAdd={addBestand} onRemove={remBestand}/>}
        {tab==="kassenbon"  && <KassenbonTab kassenbons={kassenbons} setKassenbons={setKFn} onAddEinkauf={addEinkauf}/>}
        {tab==="aufgaben"   && <AufgabenTab todos={todos} todosAnnelie={todosAnnelie} onAdd={addTodo} onAddAnnelie={addTodoAnnelie} onToggle={togTodo} onToggleAnnelie={togTodoAnnelie} onRemove={remTodo} onRemoveAnnelie={remTodoAnnelie} onUpdate={updateTodo} onUpdateAnnelie={updateTodoAnnelie}/>}
      </div>

      <nav style={{position:"fixed",bottom:0,left:0,width:"100%",background:"white",borderTop:"1px solid #e5e7eb",display:"flex",boxShadow:"0 -2px 10px rgba(0,0,0,0.08)",zIndex:100}}>
        {TABS.map(t=>{
          const badge = t.id==="einkauf"?oE : t.id==="aufgaben"?oT : 0;
          const a = tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"10px 2px 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"}}>
              <span style={{fontSize:18}}>{t.i}</span>
              <span style={{fontSize:26,fontWeight:a?700:400,color:a?"#3d5c3f":"#9ca3af"}}>{t.l}</span>
              {badge>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 15px)",background:"#dc2626",color:"white",fontSize:26,fontWeight:700,borderRadius:"50%",width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center"}}>{badge>9?"9+":badge}</span>}
              {a&&<div style={{position:"absolute",bottom:0,left:"15%",right:"15%",height:2,background:"#3d5c3f",borderRadius:2}}/>}
            </button>
          );
        })}
      </nav>
    </div>
  );
};

// Error boundary
class EB extends React.Component {
  constructor(p){super(p);this.state={e:null};}
  componentDidCatch(e){this.setState({e:e.message+"|"+e.stack?.slice(0,200)});}
  render(){
    if(this.state.e) return <div style={{padding:20,color:"red",fontSize:20,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>FEHLER: {this.state.e}</div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<EB><App/></EB>);
</script>
</body>
</html>
